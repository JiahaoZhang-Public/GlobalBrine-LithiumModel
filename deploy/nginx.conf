# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name globalbrine.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name globalbrine.com;

    ssl_certificate     /etc/letsencrypt/live/globalbrine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globalbrine.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend SPA — all non-API routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API requests to FastAPI backend
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Batch upload support
        client_max_body_size 50M;
        proxy_read_timeout 120s;
    }

    # Also proxy /health endpoint
    location /health {
        proxy_pass http://api:8000;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
